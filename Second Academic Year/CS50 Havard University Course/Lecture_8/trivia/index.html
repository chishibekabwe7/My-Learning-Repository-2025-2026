<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <title>Trivia!</title>
        <script>
            function checkMultipleChoice(selectedButton, isCorrect) {
                // reset all buttons first
                const buttons = document.querySelectorAll('#mc-buttons button');
                buttons.forEach(btn => {
                    btn.style.backgroundColor = '';
                });

                const feedback = document.querySelector('#mc-feedback');

                if (isCorrect) {
                    selectedButton.style.backgroundColor = '#4CAF50';
                    feedback.textContent = 'Correct!';
                    feedback.style.color = 'green';
                } else {
                    selectedButton.style.backgroundColor = '#f44336';
                    feedback.textContent = 'Incorrect';
                    feedback.style.color = 'red';
                }
            }

            function checkFreeResponse() {
                const input = document.querySelector('#fr-input');
                const feedback = document.querySelector('#fr-feedback');
                const answer = input.value.trim().toLowerCase();

                if (answer === 'switzerland') {
                    input.style.backgroundColor = '#4CAF50';
                    feedback.textContent = 'Correct!';
                    feedback.style.color = 'green';
                } else {
                    input.style.backgroundColor = '#f44336';
                    feedback.textContent = 'Incorrect';
                    feedback.style.color = 'red';
                }
            }
        </script>
    </head>
    <body>
        <div class="header">
            <h1>Trivia!</h1>
        </div>

        <div class="container">
            <div class="section">
                <h2>Part 1: Multiple Choice</h2>
                <hr>
                <h3>What is the approximate ratio of people to sheep in New Zealand?</h3>
                <div id="mc-buttons">
                    <button onclick="checkMultipleChoice(this, false)">6 people per 1 sheep</button>
                    <button onclick="checkMultipleChoice(this, false)">3 people per 1 sheep</button>
                    <button onclick="checkMultipleChoice(this, false)">1 person per 1 sheep</button>
                    <button onclick="checkMultipleChoice(this, false)">1 person per 3 sheep</button>
                    <button onclick="checkMultipleChoice(this, true)">1 person per 6 sheep</button>
                </div>
                <p id="mc-feedback"></p>
            </div>

            <div class="section">
                <h2>Part 2: Free Response</h2>
                <hr>
                <h3>In which country is it illegal to own only one guinea pig, as a lone guinea pig might get lonely?</h3>
                <input id="fr-input" type="text" placeholder="Your answer">
                <button onclick="checkFreeResponse()">Check Answer</button>
                <p id="fr-feedback"></p>
            </div>
        </div>
    </body>
</html>
