{% extends "encyclopedia/layout.html" %}

{% block title %}
    Create New Page
{% endblock %}

{% block body %}
    <h1>Create New Page</h1>

    {% if error %}
        <div class="alert alert-danger" role="alert">{{ error }}</div>
    {% endif %}

    <form action="{% url 'new_page' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="title">Title</label>
            <input id="title" class="form-control" type="text" name="title" value="{{ title_input|default:'' }}">
        </div>

        <div class="form-group">
            <label for="content">Markdown Content</label>
            <textarea id="content" class="form-control" name="content">{{ content_input|default:'' }}</textarea>
        </div>

        <button class="btn btn-primary" type="submit">Save</button>
    </form>
{% endblock %}
