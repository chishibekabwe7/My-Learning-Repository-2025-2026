{% extends "layout.html" %}
{% block content %}
<h2>Add Task</h2>

{% if error %}
  <div class="error">{{ error }}</div>
{% endif %}

<form method="post" action="{{ url_for('add') }}" class="form">
  <label>Description</label>
  <input name="description" type="text" required value="{{ description or '' }}" maxlength="200">
  <label>Hours (e.g., 1.5)</label>
  <input name="hours" type="number" step="0.25" required value="{{ hours or '' }}">
  <div class="form-actions">
    <button type="submit">Add task</button>
    <a href="{{ url_for('index') }}" class="link-btn">Cancel</a>
  </div>
</form>
{% endblock %}
